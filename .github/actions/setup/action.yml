name: Setup
description: Setup the development environment

runs:
  using: "composite"
  steps:
    - name: Setup Node.js and Bun
      uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3
      with:
        cache: false

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
